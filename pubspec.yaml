name: flutter_midi_command
description: A Flutter plugin for sending and receiving MIDI messages between Flutter and physical and virtual MIDI devices. Wraps CoreMIDI and android.media.midi in a thin dart/flutter layer.

version: 0.6.0
homepage: https://github.com/InvisibleWrench/FlutterMidiCommand

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.0
  # Linux (ALSA) and Windows (win32) implementations
  ffi: ^2.1.4
  win32: ^5.14.0
  universal_ble: ^2.0.4
  device_manager: ^0.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # Used to (re)generate the vendored ALSA bindings: dart run ffigen --config ffigen_alsa.yaml
  ffigen: ^18.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter.
flutter:
  # This section identifies this Flutter project as a plugin project.
  # The 'pluginClass' and Android 'package' identifiers should not ordinarily
  # be modified. They are used by the tooling to maintain consistency when
  # adding or updating assets for this project.
  plugin:
    platforms:
      android:
        package: com.invisiblewrench.fluttermidicommand
        pluginClass: FlutterMidiCommandPlugin
      ios:
        pluginClass: SwiftFlutterMidiCommandPlugin
        sharedDarwinSource: true
      macos:
        pluginClass: SwiftFlutterMidiCommandPlugin
        sharedDarwinSource: true
      linux:
        dartPluginClass: FlutterMidiCommandLinux
        dartFileName: src/flutter_midi_command_linux.dart
      windows:
        dartPluginClass: FlutterMidiCommandWindows
        dartFileName: src/flutter_midi_command_windows.dart
